<svg width="1300" height="440" viewBox="0 0 1300 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#eef6fb"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#8299b1" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4d88b8"/>
    </marker>
  </defs>
  <rect width="1300" height="440" rx="26" fill="url(#bg2)"/>
  <text x="650" y="64" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#1f5aa6">Make comparison explicit</text>
  <text x="650" y="98" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#5f6b7a">That is the step that turns a run into a repeatable workflow</text>

  <g filter="url(#shadow2)">
    <rect x="75" y="165" width="240" height="110" rx="24" fill="#edf2ff"/>
    <rect x="380" y="165" width="240" height="110" rx="24" fill="#eef9ff"/>
    <rect x="685" y="150" width="240" height="140" rx="26" fill="#e8faf1" stroke="#2f855a" stroke-width="3"/>
    <rect x="990" y="165" width="220" height="110" rx="24" fill="#fff4e8"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" fill="#17324d" font-weight="600" text-anchor="middle">
    <text x="195" y="220" font-size="28">define</text>
    <text x="195" y="252" font-size="28">setup</text>

    <text x="500" y="220" font-size="28">run</text>
    <text x="500" y="252" font-size="28">simulation</text>

    <text x="805" y="212" font-size="30">compare</text>
    <text x="805" y="246" font-size="30">results</text>
    <text x="805" y="274" font-size="18" fill="#2f855a">gauges · frames · fgmax</text>

    <text x="1100" y="220" font-size="28">repeat</text>
    <text x="1100" y="252" font-size="20" fill="#7a5a38">now with confidence</text>
  </g>

  <g stroke="#4d88b8" stroke-width="6" fill="none" marker-end="url(#arrow2)">
    <line x1="315" y1="220" x2="380" y2="220"/>
    <line x1="620" y1="220" x2="685" y2="220"/>
    <line x1="925" y1="220" x2="990" y2="220"/>
  </g>

  <rect x="360" y="330" width="580" height="58" rx="14" fill="#ffffff" stroke="#d8e4ef" stroke-width="2"/>
  <text x="650" y="365" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5f6b7a">
  Once comparison is explicit, it becomes automatable.
  </text>
