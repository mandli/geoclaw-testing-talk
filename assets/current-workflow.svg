<svg width="1300" height="420" viewBox="0 0 1300 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#8aa0b6" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#6f8095"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1300" height="420" rx="26" fill="url(#bg)"/>
  <text x="60" y="70" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#1f5aa6">A common GeoClaw workflow</text>
  <text x="60" y="108" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#5f6b7a">Great for exploration, but hard to compare and revisit</text>

  <g filter="url(#shadow)">
    <rect x="55" y="150" width="210" height="100" rx="22" fill="#edf2ff"/>
    <rect x="315" y="150" width="210" height="100" rx="22" fill="#eef9ff"/>
    <rect x="575" y="150" width="150" height="100" rx="22" fill="#e9fbf3"/>
    <rect x="775" y="150" width="210" height="100" rx="22" fill="#f5f7fb"/>
    <rect x="1035" y="150" width="210" height="100" rx="22" fill="#fff4e8"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#17324d" font-weight="600" text-anchor="middle">
    <text x="160" y="210">copy</text>
    <text x="160" y="242">example</text>
    <text x="420" y="210">tweak</text>
    <text x="420" y="242">parameters</text>
    <text x="650" y="226">run</text>
    <text x="880" y="210">inspect</text>
    <text x="880" y="242">plots</text>
    <text x="1140" y="210">repeat…</text>
    <text x="1140" y="242">and hope</text>
  </g>

  <g stroke="#6f8095" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <line x1="265" y1="200" x2="315" y2="200"/>
    <line x1="525" y1="200" x2="575" y2="200"/>
    <line x1="725" y1="200" x2="775" y2="200"/>
    <path d="M985,200 C1010,200 1010,200 1035,200"/>
  </g>

  <rect x="90" y="300" width="1120" height="70" rx="18" fill="#ffffff" stroke="#d8e4ef" stroke-width="2"/>
  <text x="650" y="343" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#5f6b7a">Where it gets painful: what changed? which run is better? can I reproduce this next week?</text>
</svg>
