  </defs>
  <rect width="1300" height="560" rx="26" fill="url(#bg3)"/>

  <text x="110" y="78" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1f5aa6">small, repeatable run</text>
  <g filter="url(#shadow3)">
    <rect x="90" y="120" width="210" height="84" rx="20" fill="#edf2ff"/>
    <rect x="350" y="120" width="180" height="84" rx="20" fill="#eef9ff"/>
    <rect x="580" y="120" width="220" height="84" rx="20" fill="#e8faf1"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#17324d" font-weight="600" text-anchor="middle">
