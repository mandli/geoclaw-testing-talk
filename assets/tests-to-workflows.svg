  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#17324d" font-weight="600" text-anchor="middle">
    <text x="175" y="475">parameters</text>
    <text x="435" y="475">generate</text>
    <text x="675" y="475">run</text>
    <text x="920" y="475">analyze</text>
  </g>
