  <path d="M650,240 C650,285 650,285 650,328" stroke="#2b9dbf" stroke-width="6" fill="none" marker-end="url(#arrow3)"/>
  <rect x="450" y="248" width="400" height="52" rx="14" fill="#ffffff" stroke="#d8e4ef" stroke-width="2"/>
  <text x="650" y="281" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#5f6b7a">same structure, scaled up</text>

  <text x="110" y="386" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1f5aa6">larger, structured experiment</text>
  <g filter="url(#shadow3)">
